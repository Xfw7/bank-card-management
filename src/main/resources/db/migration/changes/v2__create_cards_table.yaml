databaseChangeLog:
  - changeSet:
      id: v2-create-cards-table
      author: karina
      comment: "Create cards table with encrypted PAN, soft delete and block request"
      changes:
        - sql:
            sql: |
              CREATE TABLE cards (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  encrypted_pan VARCHAR(512) NOT NULL,
                  last_four CHAR(4) NOT NULL,
                  expiry_date DATE NOT NULL,
                  status VARCHAR(20) NOT NULL,
                  balance DECIMAL(19,2) NOT NULL DEFAULT 0.00,
                  block_requested BOOLEAN NOT NULL DEFAULT FALSE,
                  deleted_at TIMESTAMPTZ,
                  created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                  updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),

                  CONSTRAINT fk_cards_user
                    FOREIGN KEY (user_id) REFERENCES users (id)
                    ON DELETE RESTRICT,

                  CONSTRAINT chk_cards_status
                    CHECK (status IN ('ACTIVE', 'BLOCKED', 'EXPIRED')),

                  CONSTRAINT chk_cards_balance_non_negative
                    CHECK (balance >= 0),

                  CONSTRAINT chk_cards_last_four_digits
                    CHECK (last_four ~ '^[0-9]{4}$')
              );

      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS cards;
