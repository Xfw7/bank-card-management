databaseChangeLog:
  - changeSet:
      id: v3-create-transfers-table
      author: karina
      comment: "Create transfers table for card-to-card operations"
      changes:
        - sql:
            sql: |
              CREATE TABLE transfers (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  from_card_id BIGINT NOT NULL,
                  to_card_id BIGINT NOT NULL,
                  amount DECIMAL(19,2) NOT NULL,
                  created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),

                  CONSTRAINT fk_transfers_from_card
                    FOREIGN KEY (from_card_id) REFERENCES cards (id)
                    ON DELETE RESTRICT,

                  CONSTRAINT fk_transfers_to_card
                    FOREIGN KEY (to_card_id) REFERENCES cards (id)
                    ON DELETE RESTRICT,

                  CONSTRAINT chk_transfers_amount_positive
                    CHECK (amount > 0),

                  CONSTRAINT chk_transfers_different_cards
                    CHECK (from_card_id <> to_card_id)
              );

      rollback:
        - sql:
            sql: |
              DROP TABLE IF EXISTS transfers;
