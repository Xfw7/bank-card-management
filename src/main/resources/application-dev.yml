spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example.bankcards: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

app:
  aes:
    secret-key: ${AES_SECRET_KEY:dev-only-aes-key-32-characters!}
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-secret-key-32-characters!}
